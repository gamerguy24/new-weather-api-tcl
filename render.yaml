# Render Blueprint — free Node Web Service exposing the curl-able radar API.
#
# Unlike Cloudflare's free Workers (10 ms CPU cap), a Render Web Service has no
# per-request CPU limit, so the ~1-2 s bzip2 decode runs fine on the free tier.
# There are no npm dependencies; the server uses Node built-ins + the repo's own
# decode/render modules.
#
# Deploy: push to GitHub, then in Render choose New > Blueprint and pick the
# repo. It goes live at https://<name>.onrender.com/ — e.g.
#   https://<name>.onrender.com/radar?site=KTLX
#   https://<name>.onrender.com/radar.png?site=KTLX
services:
  - type: web
    name: nexrad-radar-api
    runtime: node
    plan: free
    region: ohio                 # close to the us-east-1 NEXRAD buckets
    buildCommand: "npm install"
    startCommand: "node server/server.js"
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "22"
